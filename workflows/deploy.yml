name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build --if-present

      - name: Smoke test (production URL)
        run: |
          curl -f https://jckmy-cs-326.vercel.app || exit 1
