name: project_test
description: "A new Flutter project."

# Prevents accidental publishing to pub.dev
publish_to: 'none'

# Versioning
version: 1.0.0+1

# Dart SDK version
environment:
  sdk: ^3.6.2

# Dependencies
dependencies:
  flutter:
    sdk: flutter
  intro_slider: ^4.2.1
  http: 1.3.0
  shared_preferences: ^2.5.2
  flare_flutter: any
  google_fonts: ^6.2.1


  cupertino_icons: ^1.0.8
  
  # Add carousel_slider for swipe feature if needed
  carousel_slider: ^4.2.1 
  pinput: ^5.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1  


flutter:
  uses-material-design: true


  # Correctly formatted assets section
  assets:
    - assets/bg.png  
    - assets/intro2.png
    - assets/intro3.png
    - assets/intro1.png
    - assets/sign-up_bg.png
    - assets/Logo.png
    - assets/app_CP.png
    - assets/Male User.png
    - assets/Location.png
    - assets/Chat Bubble.png
    - assets/Home.png
    - assets/sign_up_introscreen_elements/bottom_element1.png
    - assets/sign_up_introscreen_elements/bottom_element2.png
    - assets/sign_up_introscreen_elements/top_element.png
    - assets/Farmflow_logo.png
    

flutter_icons:
  android: true
  ios: true
  image_path: "assets/Farmflow_logo.png"  # Used for iOS and older Android versions
  adaptive_icon_foreground: "assets/adaptive_icon_foreground.png"  # Foreground layer
  adaptive_icon_background: "assets/adaptive_icon_background.png"  # Background layer
